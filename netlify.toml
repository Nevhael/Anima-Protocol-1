# Netlify deploy for the Anima Protocol frontend (pnpm monorepo).
# The api-server runs on Replit; /api/* is proxied there (same as vercel.json).
# Set VITE_CLERK_PUBLISHABLE_KEY in the Netlify site UI for production builds.

[build]
  command = "corepack enable && corepack prepare pnpm@10.15.1 --activate && pnpm install --frozen-lockfile && pnpm --filter @workspace/anima-protocol run build"
  publish = "artifacts/anima-protocol/dist/public"

[build.environment]
  NODE_VERSION = "24"
  PORT = "23660"
  BASE_PATH = "/"
  VITE_CLERK_PROXY_URL = ""
  # Placeholder so PR/deploy-preview builds succeed when the site env is unset.
  # Override with your real pk_live/pk_test key in Netlify → Site settings → Environment.
  VITE_CLERK_PUBLISHABLE_KEY = "pk_test_placeholder"

# Deploy previews / branch builds inherit the placeholder unless overridden per-site.
[context.deploy-preview.environment]
  VITE_CLERK_PUBLISHABLE_KEY = "pk_test_placeholder"

[context.branch-deploy.environment]
  VITE_CLERK_PUBLISHABLE_KEY = "pk_test_placeholder"

# Production sites (e.g. animaprotocolmain) need a build-time key too when the
# Netlify UI does not set one — override in Site settings for real deploys.
[context.production.environment]
  VITE_CLERK_PUBLISHABLE_KEY = "pk_test_placeholder"

# API → Replit backend (character store, chat, Clerk proxy, etc.)
[[redirects]]
  from = "/api/*"
  to = "https://anima-protocol.replit.app/api/:splat"
  status = 200
  force = true

# SPA fallback (after /api rules)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
