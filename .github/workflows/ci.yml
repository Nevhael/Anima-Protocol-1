name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: anima
          POSTGRES_PASSWORD: anima_dev
          POSTGRES_DB: anima_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anima -d anima_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      PORT: 23660
      BASE_PATH: /
      VITE_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
      VITE_CLERK_PROXY_URL: ""
      VITE_MIXPANEL_TOKEN: ""
      DATABASE_URL: postgresql://anima:anima_dev@localhost:5432/anima_dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test frontend
        run: pnpm --filter @workspace/anima-protocol run test

      - name: Push DB schema
        run: pnpm --filter @workspace/db run push

      - name: Test API
        run: pnpm --filter @workspace/api-server run test

      - name: Build API
        run: pnpm --filter @workspace/api-server run build

      - name: Build frontend
        run: pnpm --filter @workspace/anima-protocol run build
