kind = "web"
previewPath = "/"
title = "Anima Protocol"
version = "1.0.0"
id = "artifacts/anima-protocol"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23660

[services.development]
run = "pnpm --filter @workspace/anima-protocol run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/anima-protocol", "run", "build" ]
publicDir = "artifacts/anima-protocol/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23660"
BASE_PATH = "/"
